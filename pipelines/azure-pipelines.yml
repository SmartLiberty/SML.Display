  #      value: camouflage-project-integration-tests
  #    - name: camouflage-project-system-tests-artefact-name
  #      value: camouflage-project-system-tests
  # Docker Life Cycle
  - name: dockerCiBuildPath
    value: $(Build.SourcesDirectory)/docker/ci-docker-build
  - name: imageRepository
    value: sml-display
