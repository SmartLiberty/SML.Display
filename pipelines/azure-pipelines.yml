  # Stage : Docker Registry Promotion
  # # # # # # # # # # # # # # # # #
- stage: promote_image
  condition: and(eq(variables.needToRelease, 'true'), succeeded())
  displayName: promote docker image latest
  dependsOn: [linux_docker_build_lifecycles]
  jobs:
    - job:
      displayName: promote docker image
      pool:
        vmImage: $(vmImageUbuntu)
      steps:
        - task: Docker@2
          displayName: Docker login
          inputs:
            containerRegistry: $(container-registry-ci)
            command: login
        # docker promote
        - script: |
            docker pull $(container-registry-ci-full-name)/$(imageRepository):tests-$(Build.BuildNumber)-id-$(Build.BuildId)
            docker tag $(container-registry-ci-full-name)/$(imageRepository):tests-$(Build.BuildNumber)-id-$(Build.BuildId) $(container-registry-full-name)/$(imageRepository):$(Build.BuildNumber)
          displayName: Promote image
        - script: docker tag $(container-registry-ci-full-name)/$(imageRepository):tests-$(Build.BuildNumber)-id-$(Build.BuildId) $(container-registry-full-name)/$(imageRepository):latest
          condition: and(eq(variables.isADockerLatestImage, 'true'), succeeded())
          displayName: Promote image latest
        # Docker push
        - task: Docker@2
          displayName: Docker push
          inputs:
            containerRegistry: $(container-registry)
            repository: $(imageRepository)
            command: "push"
            tags: |
              $(Build.BuildNumber)
