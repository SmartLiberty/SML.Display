  #      value: $(Build.ArtifactStagingDirectory)/output
  #    - name: testResultsDirectory
  #      value: $(Build.ArtifactStagingDirectory)/testResults
  #    - name: logTime
  #      value: 000000
  # Release stages
  # # # #SharePoint variables
  # Feed releases
  - name: feed-package-name
    value: sml-display

resources:
  repositories:
    - repository: SML.Display
      type: github
      name: SmartLiberty/SML.Display
      endpoint: SmartDevOps
      ref: $(Build.SourceBranch)
    - repository: Tool.DeploymentModule
      type: github
      name: SmartLiberty/Tool.DeploymentModule
      endpoint: SmartDevOps
      ref: main

# Stage : set version
# # # # # # # # # # #
stages:
- stage: set_version
  dependsOn:
  displayName: Set version
  jobs:
  - job:
    pool:
      vmImage: $(vmImageUbuntu)
    displayName: set version
    steps:
    - task: PowerShell@2
      displayName: retreave version
      inputs:
        filePath: ./scripts/ci-cd/powershell/retrieveProjectVersion.ps1
        arguments: -FilePath ./sources/$(project-name)/$(project-name).csproj
    - script: echo "##vso[build.updatebuildnumber]$(version)"
      displayName: Pipeline Version
    - task: PowerShell@2
      displayName: "Check version against branch"
      condition: and(eq(variables.needToRelease, 'true'), succeeded())
      inputs:
        filePath: $(powershell-directory)/check-branching-versioning.ps1
        arguments: -Version $(version) -Branch $(Build.SourceBranch)
    # Check if UPack exist in Alpha Feed
    - task: PowerShell@2
      displayName: Check if UPack exist in Alpha Feed
      condition: and(eq(variables.needToRelease, 'true'), succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/develop'))
      inputs:
        filePath: $(powershell-directory)/feed-check-package-version-if-exist.ps1
        arguments: -FeedName Alpha -PackageName $(feed-package-name)-$(windowsRuntime) -PackageVersion $(Build.BuildNumber) -PAT $(pat-api-azure)
    # Check if UPack exist in Beta Feed
    - task: PowerShell@2
      displayName: Check if UPack exist in Beta Feed
      condition: and(eq(variables.needToRelease, 'true'), succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/qa'))
      inputs:
        filePath: $(powershell-directory)/feed-check-package-version-if-exist.ps1
        arguments: -FeedName Beta -PackageName $(feed-package-name)-$(windowsRuntime) -PackageVersion $(Build.BuildNumber) -PAT $(pat-api-azure)
    # Check if UPack exist in Beta Feed
    - task: PowerShell@2
      displayName: Check if UPack exist in Rc-Prod Feed
      condition: and(eq(variables.needToRelease, 'true'), succeeded(), or(eq(variables['Build.SourceBranch'], 'refs/heads/main'),eq(variables['Build.SourceBranch'], 'refs/heads/rc')))
      inputs:
        filePath: $(powershell-directory)/feed-check-package-version-if-exist.ps1
        arguments: -FeedName RC-Prod -PackageName $(feed-package-name)-$(windowsRuntime) -PackageVersion $(Build.BuildNumber) -PAT $(pat-api-azure)

# Stage : Linux .Net Life Cycle
# # # # # # # # # # # # # # # #
- stage: linux_dotnet_lifecycle
  displayName: Linux dotnet life cycle
  dependsOn: set_version
  jobs:
    - job:
      displayName: ubuntu x64 .Net6 LifeCycle
      pool:
        vmImage: $(vmImageubuntu)
      # Steps : .Net Life Cycle
      #########################
      steps:
      - checkout: SML.Display
      - task: UseDotNet@2
        displayName: Dotnet Install .NET Core sdk $(dotnetcore)
        inputs:
          version: $(dotnetcore)
      # Restore sln
      - task: DotNetCoreCLI@2
        displayName: Restore
        inputs:
          command: restore
          projects: $(sln-directory)/*.sln
          feedsToUse: select
          vstsFeed: $(feedName)
          includeNuGetOrg: true
      ## Build all csproj
      - task: DotNetCoreCLI@2
        displayName: Build
        inputs:
          command: build
          arguments: --configuration $(build-configuration) --no-restore
          projects: $(sln-directory)/**/*.csproj
      # Collect code coverage metrics with Coverlet
      # All Unit Tests csproj
      - task: DotNetCoreCLI@2
        displayName: "dotnet test"
        inputs:
          command: test
          arguments: '--configuration $(buildConfiguration) --collect:"XPlat Code Coverage" -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura'
          publishTestResults: true
          projects: $(sln-directory)/**/*.Tests.Unit.csproj # update with your test project directory
      # Publish all unit tests resutls and code coveradge
      - task: PublishCodeCoverageResults@2
        displayName: "Publish code coverage report"
        inputs:
          codeCoverageTool: "Cobertura"
          summaryFileLocation: "$(Agent.TempDirectory)/**/coverage.cobertura.xml"
      # Linux runtime
      # Publish project linux runtime
      - task: DotNetCoreCLI@2
        displayName: Publish $(artifactBaseName)-$(linuxRuntime)
        inputs:
          projects: $(project-directory)/$(project-name).csproj
          command: publish
          arguments: -c $(build-configuration) -o  $(Build.ArtifactStagingDirectory)/$(artifactBaseName)-$(linuxRuntime) -r linux-x64 --self-contained false
          zipAfterPublish: true
          modifyOutputPath: false
      # Publish pipeline linux runtime artefact
      - task: PublishPipelineArtifact@1
        displayName: Publish pipeline artefact $(artifactBaseName)-$(linuxRuntime)
        inputs:
          targetPath: $(Build.ArtifactStagingDirectory)/$(artifactBaseName)-$(linuxRuntime)/$(artifactBaseName)-$(linuxRuntime).zip
          artifactName: $(artifactBaseName)-$(linuxRuntime)
      # Windows runtime
      # Publish project windows runtime
      - task: DotNetCoreCLI@2
        displayName: Publish $(artifactBaseName)-$(windowsRuntime)
        inputs:
          projects: $(project-directory)/$(project-name).csproj
          command: publish
          arguments: -c $(build-configuration) -o  $(Build.ArtifactStagingDirectory)/$(artifactBaseName)-$(windowsRuntime)/$(project-name) -r win-x64 --self-contained false
          zipAfterPublish: false
          modifyOutputPath: false
      # Copy scripts
      - task: CopyFiles@2
        displayName: Copy scripts
        inputs:
          SourceFolder: $(service-deploy-directory)/deploy
          TargetFolder: $(Build.ArtifactStagingDirectory)/$(artifactBaseName)-$(windowsRuntime)
          Contents: '*.ps1'
      # Fetch deployment module
      - checkout: Tool.DeploymentModule
      - task: CopyFiles@2
        inputs:
          SourceFolder: $(Build.SourcesDirectory)/Tool.DeploymentModule
          TargetFolder: $(Build.ArtifactStagingDirectory)/$(artifactBaseName)-$(windowsRuntime)
          Contents: 'DeploymentModule.psm1'
        displayName: "Get file from Tool.DeploymentModule"
      - checkout: SML.Display
      # Archive all
      - task: ArchiveFiles@2
        inputs:
          rootFolderOrFile: $(Build.ArtifactStagingDirectory)/$(artifactBaseName)-$(windowsRuntime)
          includeRootFolder: false
          archiveType: zip
          archiveFile: $(Build.ArtifactStagingDirectory)/$(artifactBaseName)-$(windowsRuntime).zip
          replaceExistingArchive: true
          verbose: true
      # Publish pipeline windows runtime artefact
      - task: PublishPipelineArtifact@1
        displayName: Publish pipeline artefact $(artifactBaseName)-$(windowsRuntime)
        inputs:
          targetPath: $(Build.ArtifactStagingDirectory)/$(artifactBaseName)-$(windowsRuntime).zip
          artifactName: $(artifactBaseName)-$(windowsRuntime)
      # Publish integration tests
      - task: DotNetCoreCLI@2
        displayName: Dotnet publish artifact $(ProjectIntegrationTestName)
        inputs:
          projects: $(sln-directory)/$(ProjectIntegrationTestName)/*.csproj
          command: publish
          arguments: -c $(build-configuration) -o  $(Build.ArtifactStagingDirectory)/$(ProjectIntegrationTestName)
          zipAfterPublish: true
          modifyOutputPath: false
          publishWebProjects: false
      # Publish pipeline integration artefact
      - task: PublishPipelineArtifact@1
        displayName: Publish pipeline artefact $(ProjectIntegrationTestName)
        inputs:
          targetPath: $(Build.ArtifactStagingDirectory)/$(ProjectIntegrationTestName)/$(ProjectIntegrationTestName).zip
          artifactName: $(ProjectIntegrationTestName)
    # Publish system tests
      - task: DotNetCoreCLI@2
        displayName: Dotnet publish artifact $(ProjectSystemTestName)
        inputs:
          projects: $(sln-directory)/$(ProjectSystemTestName)/*.csproj
          command: publish
          arguments: -c $(build-configuration) -o  $(Build.ArtifactStagingDirectory)/$(ProjectSystemTestName)
          zipAfterPublish: true
          modifyOutputPath: false
          publishWebProjects: false
      # Publish pipeline project artefact
      - task: PublishPipelineArtifact@1
        displayName: Publish pipeline artefact $(ProjectSystemTestName)
        inputs:
          targetPath: $(Build.ArtifactStagingDirectory)/$(ProjectSystemTestName)/$(ProjectSystemTestName).zip
          artifactName: $(ProjectSystemTestName)
      # Prepare camouflage project mock server system tests
      - task: PowerShell@2
        displayName:  Prepare camouflage project mock server system tests
        inputs:
          filePath: $(powershell-directory-sml-service)/copy-proto-from-package-references-in-csproj.ps1
          arguments: -csprojFilePath "$(sln-directory)/$(ProjectSystemTestName)/$(ProjectSystemTestName).csproj" -nuGetPackageRoot "~/.nuget/packages/" -destinationPath "$(sln-directory)/$(ProjectSystemTestName)/camouflage.mock.server/camouflage/grpc/protos"
      # Archives camouflage project mock server system tests
      - task: ArchiveFiles@2
        displayName: Archive camouflage project mock server system tests
        inputs:
          rootFolderOrFile: $(sln-directory)/$(ProjectSystemTestName)/camouflage.mock.server/camouflage
          archiveType: zip
          includeRootFolder: false
          archiveFile: $(Build.ArtifactStagingDirectory)/$(camouflage-project-system-tests-artefact-name).zip
      # publish camouflage project mock server system tests
      - task: PublishPipelineArtifact@1
        displayName: Publish pipeline artefact camouflage system mock server
        inputs:
          targetPath: $(Build.ArtifactStagingDirectory)/$(camouflage-project-system-tests-artefact-name).zip
          artifactName: $(camouflage-project-system-tests-artefact-name)
      
  # Stage : Linux Docker build Life Cycle
  # # # # # # # # # # # # # # # # # # #

- stage: linux_docker_build_lifecycles
  displayName: Linux Docker build Life Cycle
  dependsOn: [linux_dotnet_lifecycle]
  jobs:
    # Job : Docker build lifecycle
    ##############################
    - job:
      displayName: Linux Docker build project
      pool:
        vmImage: $(vmImageUbuntu)
      steps:
        # Download artifact
        - task: DownloadPipelineArtifact@2
          displayName: Download $(artifactBaseName)-$(linuxRuntime)
          inputs:
            artifact: $(artifactBaseName)-$(linuxRuntime)
            path: $(dockerCiBuildPath)/$(project-name)/app
        # Extract artifact file
        - task: ExtractFiles@1
          displayName: Extract artifact $(artifactBaseName)-$(linuxRuntime)
          inputs:
            archiveFilePatterns: $(dockerCiBuildPath)/$(project-name)/app/*.zip
            destinationFolder: $(dockerCiBuildPath)/$(project-name)/app
            cleanDestinationFolder: false
            overwriteExistingFiles: false
        # Delete archive
        - task: DeleteFiles@1
          displayName: Delete artifact file $(artifactBaseName)-$(linuxRuntime)
          inputs:
            Contents: $(dockerCiBuildPath)/$(project-name)/app/*.zip
        - task: Docker@2
          displayName: Docker build
          inputs:
            containerRegistry: $(container-registry-ci)
            repository: $(imageRepository)
            command: "build"
            Dockerfile: $(dockerCiBuildPath)/$(project-name)/Dockerfile
            buildContext: $(dockerCiBuildPath)/$(project-name)
            arguments: --build-arg IMAGE_REGISTRY=$(container-registry-ci-full-name) --build-arg IMAGE_DOTNET_SDK_TAG=$(dotnet-sdk-docker-image-tag) --build-arg IMAGE_DOTNET_ASPNET_TAG=$(dotnet-aspnet-docker-image-tag)
            tags: |
              tests-$(Build.BuildNumber)-id-$(Build.BuildId)
        # Docker build push image
        - task: Docker@2
          displayName: Docker push
          inputs:
            containerRegistry: $(container-registry-ci)
            repository: $(imageRepository)
            command: "push"
            tags: |
              tests-$(Build.BuildNumber)-id-$(Build.BuildId)
