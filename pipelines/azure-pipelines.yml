  #      value: $(imageRepository)-tests-system
  #    - name: imageRepositoryTestsIntegration
  #      value: $(imageRepository)-tests-integration
  #    - name: imageRepositoryTestsSystemMockServer
  #      value: $(imageRepository)-tests-system-mock-server
  #    - name: imageRepositoryTestsIntegrationMockServer
  #      value: $(imageRepository)-tests-integration-mock-server
