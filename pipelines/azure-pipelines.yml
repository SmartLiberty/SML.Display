trigger:
  branches:
    include:
      - main
      - qa
      - develop
  batch: true
pr:
  autoCancel: true

variables:
  # Key Vault
  - group: key-vault-group
  # Workflow branching strategies
  - name: needToRelease
    value: $[or(eq(variables['Build.SourceBranch'], 'refs/heads/main'),
      eq(variables['Build.SourceBranch'], 'refs/heads/develop'),
      eq(variables['Build.SourceBranch'], 'refs/heads/qa'))]
  - name: isADockerLatestImage
    value: $[eq(variables['Build.SourceBranch'], 'refs/heads/main')]
  # General
  - name: System.Debug
    value: false
  # Versions & Plateforms
  - name: vmImageUbuntu
    value: ubuntu-22.04
  - name: dotnet-sdk-docker-image-tag
    value: 8.0
  - name: dotnet-aspnet-docker-image-tag
    value: 8.0
  #    - name: camouflage-version
  #      value: 0.8.2
  # Artefact repository
  - name: feedName
    value: SmartDevOps/SmartNuget
  # Container registry
  - name: container-registry-ci
    value: smlacrci
  - name: container-registry-ci-full-name
    value: smlacrci.azurecr.io
  - name: container-registry
    value: smlpoc-cr
  - name: container-registry-full-name
    value: smlpoc.azurecr.io
  # directories
  - name: powershell-directory
    value: $(Build.SourcesDirectory)/scripts/ci-cd/powershell
  - name: powershell-directory-sml-service
    value: $(Build.SourcesDirectory)/SML.Display/scripts/ci-cd/powershell
  - name: sln-directory
    value: $(Build.SourcesDirectory)/SML.Display/sources
  - name: project-directory
    value: $(sln-directory)/$(project-name)
  - name : service-deploy-directory
    value: $(Build.SourcesDirectory)/SML.Display/scripts
  # Dotnet Life Cycle
  - name: dotnetcore
    value: 8.0.x
  - name: build-configuration
    value: Release
  - name: project-name
    value: SML.Display
  - name: packageName
    value: $(project-name)-$(Build.BuildNumber)
  - name: artifactBaseName
    value: $(project-name)
  - name: ProjectIntegrationTestName
    value: $(project-name).Tests.Integration
  - name: ProjectSystemTestName
    value: $(project-name).Tests.System
    # Linux runtime
  - name: linuxRuntime
    value: linux-x64
    # Windows artefacts sufix
  - name: windowsRuntime
    value: win-x64
