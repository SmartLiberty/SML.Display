  # Stage : Release feed
  # # # # # # # # # # #
- stage: feed_release
  condition: and(eq(variables.needToRelease, 'true'), succeeded())
  displayName: Feed Release
  dependsOn: [linux_docker_build_lifecycles]
  jobs:
    # Job : Windows feed release
    - job: Feed_windows_runtime_release
      displayName: Windows runtime release on feed
      pool:
        vmImage: $(vmImageUbuntu)
      steps:
        # Download pipeline windows artifact
        - task: DownloadPipelineArtifact@2
          displayName: Download pipeline artefact $(artifactBaseName)-$(windowsRuntime)
          inputs:
            artifact: $(artifactBaseName)-$(windowsRuntime)
            path: $(Build.ArtifactStagingDirectory)/$(artifactBaseName)-$(windowsRuntime)
        - script: |
            mv $(Build.ArtifactStagingDirectory)/$(artifactBaseName)-$(windowsRuntime)/$(artifactBaseName)-$(windowsRuntime).zip $(Build.ArtifactStagingDirectory)/$(artifactBaseName)-$(windowsRuntime)/$(feed-package-name)-$(windowsRuntime).zip
          displayName: rename downloded artefact
        # Release artifact
        - task: UniversalPackages@0
          displayName: UPack Publish Alpha
          condition: and(eq(variables.needToRelease, 'true'), succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/develop'))
          inputs:
            command: publish
            publishDirectory: $(Build.ArtifactStagingDirectory)/$(artifactBaseName)-$(windowsRuntime)
            feedsToUsePublish: "internal"
            vstsFeedPublish: SmartDevOps/Alpha
            vstsFeedPackagePublish: $(feed-package-name)-$(windowsRuntime)
            versionOption: custom
            versionPublish: $(Build.BuildNumber)
            packagePublishDescription: "$(project-name) for windows"
        # Release artifact
        - task: UniversalPackages@0
          displayName: UPack Publish Beta
          condition: and(eq(variables.needToRelease, 'true'), succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/qa'))
          inputs:
            command: publish
            publishDirectory: $(Build.ArtifactStagingDirectory)/$(artifactBaseName)-$(windowsRuntime)
            feedsToUsePublish: "internal"
            vstsFeedPublish: SmartDevOps/Beta
            vstsFeedPackagePublish: $(feed-package-name)-$(windowsRuntime)
            versionOption: custom
            versionPublish: $(Build.BuildNumber)
            packagePublishDescription: "$(project-name) for windows"
        # Release artifact
        - task: UniversalPackages@0
          displayName: UPack Publish Rc-Prod
          condition: and(eq(variables.needToRelease, 'true'), succeeded(), or(eq(variables['Build.SourceBranch'], 'refs/heads/main'),eq(variables['Build.SourceBranch'], 'refs/heads/rc')))
          inputs:
            command: publish
            publishDirectory: $(Build.ArtifactStagingDirectory)/$(artifactBaseName)-$(windowsRuntime)
            feedsToUsePublish: "internal"
            vstsFeedPublish: SmartDevOps/RC-Prod
            vstsFeedPackagePublish: $(feed-package-name)-$(windowsRuntime)
            versionOption: custom
            versionPublish: $(Build.BuildNumber)
            packagePublishDescription: "$(project-name) for windows"
